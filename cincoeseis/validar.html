<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validando CPF</title>
<style>
body {
    font-family: 'Trebuchet MS', Arial, sans-serif;
    background-color: #f3e8ff; 
}

form {
    background-color: #ffffff;
    width: 320px;
    margin: 100px auto;
    padding: 20px;
    border-radius: 10px;
}

label {
    color: #6a4c93; 
}

input {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    border: 1px solid #d6c2f0;
    border-radius: 5px;
}

button {
    margin-top: 5px;
    margin-bottom: 10px;
    padding: 6px;
    background-color: #cdb4db; 
    color: #4a3f6b;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background-color: #b8a2d1; 
}
</style>
</head>

<body>

<form>

<label>CPF:</label><br>
<input type="text" id="cpf">
<button type="button" onclick="validar()">Validar</button>

<br><br>

<label>Senha:</label><br>
<input type="password" id="senha">
<button type="button" onclick="validar()">Validar</button>

<br><br>

<label>Email:</label><br>
<input type="text" id="email">
<button type="button" onclick="validar()">Validar</button>

<br><br>

<label>Apenas números:</label><br>
<input type="text" id="numero">
<button type="button" onclick="validar()">Validar</button>

</form>
    
</body>

<script>
function validar() {

    
    let valor = document.getElementById("cpf").value;
    let regex = /^\d{3}\.\d{3}\.\d{3}-\d{2}$/;

    if (regex.test(valor)){
        alert ("Cpf válido!");
    }else{
        alert("Cpf inválido!");
    }

    
    let valor2 = document.getElementById("senha").value;

    if (valor2.length < 8) {
        alert("A senha deve ter pelo menos 8 caracteres");
    } else if (!/[A-Z]/.test(valor2)) {
        alert("A senha precisa ter uma letra maiúscula");
    } else if (!/[0-9]/.test(valor2)) {
        alert("A senha precisa ter um número");
    } else {
        alert("Senha válida!");
    }

    
    let valor3 = document.getElementById("email").value;
    let regex3 = /^[^\s@]+@[^\s@]+\.com$/;

    if (regex3.test(valor3)){
        alert("Email válido!");
    }else{
        alert("Email inválido!");
    }

    
    let valor4 = document.getElementById("numero").value;
    let regex4 = /^\d+$/;

    if (regex4.test(valor4)){
        alert("Apenas números");
    }else{
        alert("Só números são permitidos!");
    }

}
</script>

</html>
