<!DOCTYPE html>
<html lang="en">
<head>
    <title>Soma e Multiplicação</title>
        <meta charset="UTF-8">


</head>
<body>

<script>
let n1 = Number(prompt("digite o 1:"));
let n2 = Number(prompt("digite o 2:"));

let soma = n1 + n2;
let multiplicacao = n1 * n2;

alert("A soma é: " + soma);
alert("A multiplicação é: " + multiplicacao);
</script>

</body>
</html>
