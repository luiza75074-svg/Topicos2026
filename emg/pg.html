<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha primeira pagina criativa </title>
     <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
       
body {
    
    font-family: Arial, sans-serif;
    text-align: center;
}

#texto {
    color: #e6acd2;
    font-size: 40px;
    margin-top: 50px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
}


button {
    background-color: #ffb6c1;
    border: none;
    padding: 10px 20px;
    margin: 8px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 16px;
    transition: 0.3s;
}

button:hover {
    background-color: #ff69b4;
    transform: scale(1.05);
}
</style>
 </style>



</head>


<body>
   <h1 id="texto">Olá pessoal ✨</h1>

   <button
onclick="document.getElementById('texto').innerHTML =
'Novo texto'">Mudar Texto</button>

<button onclick="boasvindas()">Bem-vindo</button>


<button
onclick = "body.style.backgroundColor= 'MediumVioletRed'">Mudar cor</button>
<button
onclick = "body.style.backgroundColor= 'DeepPink'">Mudar cor</button>
<button
onclick = "body.style.backgroundColor= 'HotPink'">Mudar cor</button>

<script>
function boasvindas() {
    alert(" 🎉 Bem-vindo!"); 
}


</script>
</body>
</html>
