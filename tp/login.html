<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
    margin:0;
    padding:0;
    background-color:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family: "Segoe UI", cursive;
}

form{
    background:rgba(255,255,255,0.05);
    padding:40px;
    border-radius:15px;
    backdrop-filter: blur(8px);
    width:320px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,255,0.3);
}

h2{
    color:#4da6ff;
    font-weight:300;
    margin-bottom:25px;
}

label{
    display:block;
    text-align:left;
    margin-top:15px;
    color:#4da6ff;
}

input{
    width:100%;
    padding:8px;
    margin-top:5px;
    border:none;
    border-radius:8px;
    outline:none;
}

button{
    margin-top:25px;
    padding:10px;
    width:100%;
    border:none;
    border-radius:8px;
    background-color:#0066ff;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background-color:#0044aa;
}
</style>

</head>
<body>

<form action="login.php" method="post">
    <h2>Entrar</h2>

    <label>Nome de Usuário</label>
    <input type="text" name="usuario" required>

    <label>Senha</label>
    <input type="password" name="senha" required>

    <button type="submit">Entrar</button>
</form>

</body>
</html>
